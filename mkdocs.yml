site_name: go-simd docs
site_description: Pure-Go SIMD drop-ins for the Go standard library — base64, base32, hex, utf8, adler32, strconv and the primitives under them, generated by go-asmgen across all 6 of Go's 64-bit SIMD targets (amd64/arm64/riscv64/loong64/ppc64le/s390x).
site_url: https://go-simd.github.io/docs/
repo_url: https://github.com/go-simd
repo_name: go-simd
edit_uri: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Methodology: methodology.md
  - Stdlib drop-ins:
      - base64: repos/base64.md
      - base32: repos/base32.md
      - hex: repos/hex.md
      - ascii85: repos/ascii85.md
      - utf8: repos/utf8.md
      - adler32: repos/adler32.md
      - crc64: repos/crc64.md
      - strconv: repos/strconv.md
  - Primitives:
      - matchlen: repos/matchlen.md
      - bitpack: repos/bitpack.md
      - popcount: repos/popcount.md
      - histogram: repos/histogram.md
      - streamvbyte: repos/streamvbyte.md
      - xxhash: repos/xxhash.md
      - floats: repos/floats.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
